<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Interview Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<div class="main">

  <!-- LEFT SIDE (Branding) -->
  <div class="left">
    <h1>🚀 AI Interview Arena</h1>
    <p>Simulate real-world interviews with adaptive AI.</p>
  </div>

  <!-- RIGHT SIDE (Auth Card) -->
  <div class="right">
    <div class="card">

      <div class="tabs">
        <button class="active" onclick="showLogin()">Login</button>
        <button onclick="showSignup()">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div id="loginForm">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="main-btn">Login</button>
      </div>

      <!-- SIGNUP -->
      <div id="signupForm" class="hidden">
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="main-btn">Create Account</button>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>

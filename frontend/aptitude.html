<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aptitude Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="aptitude.css" />
</head>
<body>

<div class="page-shell">

  <div class="aptitude-frame">

    <header class="topbar">
      <h2>AI Interview Arena</h2>
      <button onclick="submitTest()">End Aptitude Test</button>
    </header>

    <main class="aptitude-content">

      <h2>Aptitude Test</h2>

      <p><b>Stream:</b> <span id="streamName"></span></p>
      <p><b>Difficulty:</b> <span id="difficultyName"></span></p>
      <p><b>Questions:</b> 10</p>

      <!-- QUESTIONS -->
      <div id="questionContainer"></div>

      <!-- SUBMIT -->
      <button onclick="submitTest()">Submit Test</button>

      <!-- RESULT -->
      <div id="resultPanel" class="hidden">
        <h2>Your Aptitude Result</h2>
        <p id="scoreBadge">0 / 10</p>

        <div id="resultSummary"></div>
        <div id="answerReview"></div>

        <button onclick="goDashboard()">Back to Dashboard</button>
      </div>

    </main>

  </div>

</div>

<script src="aptitude.js"></script>

</body>
</html>
